# Domain Definitions for Context Priming Analysts
#
# This file contains BASE domain definitions that apply to most projects.
# Project-specific domains are auto-detected by cc-prime-cw (via project_analyzer.py)
# and stored in .claude/project_config.yaml, which is merged at runtime.
#
# To customize for your project:
# 1. Let /cc-prime-cw auto-detect patterns (runs project_analyzer.py when project_config.yaml is missing)
# 2. Or manually add domains below
#
# The discovery script merges:
#   1. project_config.yaml domains (if exists) - highest priority
#   2. These base domains - fallback defaults

domains:
  # ========== Universal Base Domains ==========
  # These apply to nearly all software projects

  - name: source
    description: |
      Main application source code.
      Core business logic, primary modules, and entry points.
      Focus on understanding the main components and how they interact.
    patterns:
      # Common source directories - will be supplemented by project_config
      - "src/**/*"
      - "lib/**/*"
      - "app/**/*"
      - "pkg/**/*"
      - "internal/**/*"
    keywords:
      # Generic patterns that work across languages
      - "class\\s+\\w+"
      - "function\\s+|def\\s+|fn\\s+|func\\s+"
      - "import|from .* import|require|use\\s+"
      - "export|pub\\s+|public\\s+"
    report_sections:
      - main_components
      - architecture_patterns
      - entry_points
      - key_abstractions
      - modification_targets

  - name: config
    description: |
      Configuration files and settings.
      Environment setup, build configuration, and project metadata.
      Includes dependency definitions and tooling configuration.
    patterns:
      # Root-level config files only (not recursive globs that match data dirs)
      - "package.json"
      - "tsconfig.json"
      - "pyproject.toml"
      - "Cargo.toml"
      - "go.mod"
      - "*.toml"
      - "*.ini"
      - "*.cfg"
      - ".env*"
      - "config/**/*"
      - "settings/**/*"
    keywords:
      - "version|name|description"
      - "dependencies|devDependencies|requires"
      - "scripts|commands|targets"
      - "config|settings|options|env"
    report_sections:
      - project_metadata
      - dependencies
      - build_config
      - environment
      - modification_targets

  - name: tests
    description: |
      Test files and testing infrastructure.
      Unit tests, integration tests, fixtures, and test utilities.
      Understanding test patterns helps understand expected behavior.
    patterns:
      - "tests/**/*"
      - "test/**/*"
      - "spec/**/*"
      - "**/*_test.*"
      - "**/*.test.*"
      - "**/*.spec.*"
      - "**/test_*.*"
    keywords:
      - "def test_|fn test_|func Test|it\\(|describe\\("
      - "fixture|mock|Mock|patch|stub"
      - "assert|expect|should|must"
      - "beforeEach|afterEach|setUp|tearDown|before|after"
    report_sections:
      - test_structure
      - fixtures
      - coverage_areas
      - test_patterns
      - modification_targets

  - name: docs
    description: |
      Documentation files.
      README, guides, API documentation, and architectural docs.
      Provides context about intended usage and design decisions.
    patterns:
      - "README*"
      - "CLAUDE*"
      - "CONTRIBUTING*"
      - "CHANGELOG*"
      - "docs/**/*"
      - "doc/**/*"
      - "*.md"
    keywords:
      - "# |## |### "
      - "installation|usage|getting started"
      - "api|endpoint|method|function"
      - "architecture|design|overview"
    report_sections:
      - project_overview
      - setup_instructions
      - architecture_docs
      - api_docs
      - modification_targets

  - name: scripts
    description: |
      Build scripts, automation, and tooling.
      CI/CD configuration, deployment scripts, and development tools.
    patterns:
      - "scripts/**/*"
      - "bin/**/*"
      - "tools/**/*"
      - "Makefile"
      - "makefile"
      - ".github/**/*"
      - ".gitlab-ci.yml"
      - "Dockerfile*"
      - "docker-compose*"
      - "*.sh"
    keywords:
      - "run|build|test|deploy|install"
      - "script|command|task|target"
      - "docker|container|image"
      - "ci|cd|workflow|pipeline"
    report_sections:
      - build_scripts
      - ci_cd
      - dev_tools
      - deployment
      - modification_targets

  - name: embedded
    description: |
      Analyze embedded firmware, HAL layer, and hardware interfaces.
      Microcontroller code, peripheral drivers, RTOS tasks, and build targets.
    patterns:
      - "src/**/*.ino"
      - "src/**/*.c"
      - "src/**/*.cpp"
      - "include/**/*.h"
      - "lib/**/*"
      - "platformio.ini"
      - "CMakeLists.txt"
    keywords:
      - "void setup|void loop"
      - "GPIO|UART|SPI|I2C|ADC|PWM"
      - "ISR|interrupt|__attribute__"
      - "FreeRTOS|xTask|vTask|xQueue"
      - "esp_|ESP_LOG|ESP_ERROR"
      - "#ifdef|#if defined"
      - "volatile|register"
    report_sections:
      - hardware_interfaces
      - communication_protocols
      - interrupt_handlers
      - rtos_tasks
      - build_targets
      - modification_targets

# Metadata for the analyst system
analyst_config:
  # Maximum files to analyze per domain
  max_files_per_domain: 50

  # Priority order for analysis
  priority_order:
    - source
    - config
    - tests
    - docs
    - scripts

  # Report output format
  report_format: markdown
  include_line_numbers: true

  # Foundation documents - high-value docs read directly at session start
  foundation_patterns:
    - "README.md"
    - "README*"
    - "CLAUDE.md"
    - "CLAUDE*"
    - "CONTRIBUTING.md"
    - "ARCHITECTURE.md"
    - "docs/ARCHITECTURE.md"
    - "DESIGN.md"
    - "docs/DESIGN.md"
    - ".claude/handoff/active.md"

  # Project config file - merged with these base domains
  # Auto-generated by project_analyzer.py when /cc-prime-cw runs on a new project
  project_config_path: ".claude/project_config.yaml"
