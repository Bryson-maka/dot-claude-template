# Task Execution Workflow Configuration
#
# This file defines the configurable aspects of the cc-execute command.
# Edit these values to customize behavior for your project.

# Agent Types
# Reference for the lead's team composition reasoning.
# The lead decides how many agents and which types per task — no fixed roster.
agent_types:
  Explore:
    tools: [Read, Glob, Grep, Bash, WebFetch, WebSearch]
    cannot: [Edit, Write, NotebookEdit]
    use_for: Investigation, analysis, web research, architecture review, adversarial challenge

  general-purpose:
    tools: [Read, Glob, Grep, Bash, Edit, Write, NotebookEdit, AskUserQuestion]
    cannot: []
    use_for: Implementation, refactoring, test execution, any work requiring code changes

# Adversarial Challenge Configuration
adversarial:
  # Required for every task — the adversary reads actual files and git diff
  required: true

  # Maximum rounds of challenge before escalating to user
  max_rounds: 2

  # Agent type for adversary (read-only, cannot modify code)
  agent_type: Explore

  # Files the adversary must NOT read
  excluded_patterns:
    - ".env*"
    - "*credentials*"
    - "*secret*"
    - "*.pem"
    - "*.key"

# Verification Configuration
verification:
  # Always run verification after these actions
  verify_after:
    - code_edit
    - file_create
    - dependency_change

# Project Detection
# Patterns to detect project type and available commands.
# Used by discover.py to populate test/build/lint commands.
project_detection:
  python:
    indicators:
      - pyproject.toml
      - setup.py
      - requirements.txt
      - Pipfile
    test_commands:
      - "uv run pytest"
      - "pytest"
      - "python -m pytest"
    lint_commands:
      - "ruff check"
      - "flake8"
      - "mypy"
    build_commands:
      - "uv build"
      - "python -m build"

  node:
    indicators:
      - package.json
      - package-lock.json
      - yarn.lock
      - pnpm-lock.yaml
    test_commands:
      - "npm test"
      - "yarn test"
      - "pnpm test"
    lint_commands:
      - "npm run lint"
      - "eslint"
    build_commands:
      - "npm run build"
      - "yarn build"

  rust:
    indicators:
      - Cargo.toml
      - Cargo.lock
    test_commands:
      - "cargo test"
    lint_commands:
      - "cargo clippy"
    build_commands:
      - "cargo build"

  go:
    indicators:
      - go.mod
      - go.sum
    test_commands:
      - "go test ./..."
    lint_commands:
      - "golangci-lint run"
    build_commands:
      - "go build"

  make:
    indicators:
      - Makefile
      - makefile
    test_commands:
      - "make test"
    lint_commands:
      - "make lint"
    build_commands:
      - "make build"

  # ========== Robotics & Embedded Project Types ==========

  ros2:
    indicators:
      - package.xml
      - colcon.meta
      - ros2_ws/
    test_commands:
      - "colcon test"
      - "ros2 run <package> <test_node>"
    lint_commands:
      - "ament_flake8"
      - "ament_cpplint"
      - "ament_uncrustify"
    build_commands:
      - "colcon build"
      - "colcon build --symlink-install"

  arduino:
    indicators:
      - "*.ino"
      - platformio.ini
      - arduino.json
    test_commands:
      - "pio test"
      - "arduino-cli compile --verify"
    lint_commands:
      - "cpplint"
    build_commands:
      - "pio run"
      - "arduino-cli compile"

  platformio:
    indicators:
      - platformio.ini
    test_commands:
      - "pio test"
      - "pio test -e native"
    lint_commands:
      - "pio check"
    build_commands:
      - "pio run"
      - "pio run -e release"

  embedded_cmake:
    indicators:
      - CMakeLists.txt
      - cmake/
      - toolchain.cmake
    test_commands:
      - "ctest"
      - "make test"
    lint_commands:
      - "clang-tidy"
      - "cppcheck"
    build_commands:
      - "cmake --build build"
      - "make -j$(nproc)"

  zephyr:
    indicators:
      - prj.conf
      - west.yml
      - zephyr/
    test_commands:
      - "west twister"
      - "west build -t run"
    lint_commands:
      - "west checkpatch"
    build_commands:
      - "west build"
      - "west flash"

  esp_idf:
    indicators:
      - sdkconfig
      - sdkconfig.defaults
      - components/
    test_commands:
      - "idf.py test"
    lint_commands:
      - "idf.py check"
    build_commands:
      - "idf.py build"
      - "idf.py flash"

  # ========== Web Application Project Types ==========

  nextjs:
    indicators:
      - next.config.js
      - next.config.mjs
      - next.config.ts
    test_commands:
      - "npm test"
      - "pnpm test"
      - "vitest"
      - "jest"
    lint_commands:
      - "npm run lint"
      - "next lint"
    build_commands:
      - "npm run build"
      - "next build"

  react:
    indicators:
      - src/App.tsx
      - src/App.jsx
      - vite.config.ts
      - vite.config.js
    test_commands:
      - "npm test"
      - "vitest"
      - "jest"
    lint_commands:
      - "npm run lint"
      - "eslint src/"
    build_commands:
      - "npm run build"
      - "vite build"

  fastapi:
    indicators:
      - main.py
      - app/main.py
    test_commands:
      - "pytest"
      - "python -m pytest"
    lint_commands:
      - "ruff check"
      - "mypy"
    build_commands:
      - "uvicorn main:app --reload"

  django:
    indicators:
      - manage.py
      - settings.py
    test_commands:
      - "python manage.py test"
      - "pytest"
    lint_commands:
      - "ruff check"
      - "flake8"
    build_commands:
      - "python manage.py runserver"

# Workflow Phases
phases:
  - name: analyze
    description: Break task into todos, reason about team composition
    required: true

  - name: deploy
    description: Create team, spawn agents, assign tasks
    required: true

  - name: supervise
    description: Monitor progress, coordinate agents, unblock work
    required: true

  - name: verify
    description: Run existing tests, live verification
    required: true

  - name: challenge
    description: Adversarial review — first principles, verified codebase evidence
    required: true

  - name: complete
    description: Shutdown team, summarize results
    required: true
